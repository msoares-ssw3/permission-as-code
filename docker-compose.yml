services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: simbios3
      POSTGRES_PASSWORD: simbios3
      POSTGRES_DB: simbios3
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simbios3 -d simbios3"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
